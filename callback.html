<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Authenticating...</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #F7F6F3; color: #1A1917; }
    .box { text-align: center; }
    .spinner { width: 32px; height: 32px; border: 3px solid #E0DDD8; border-top-color: #1A1917; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; color: #6B6862; }
  </style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <p>Authenticating with Zoho...</p>
</div>
<script>
  // Extract access token from URL hash
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const accessToken = params.get('access_token');
  const expiresIn = params.get('expires_in');

  if (accessToken) {
    const expiry = Date.now() + (parseInt(expiresIn) * 1000);
    sessionStorage.setItem('zoho_access_token', accessToken);
    sessionStorage.setItem('zoho_token_expiry', expiry);
    window.location.href = '/call-tracker/';
  } else {
    document.querySelector('p').textContent = 'Authentication failed. Please try again.';
  }
</script>
</body>
</html>
