name: Daily Call Summary Report

on:
  schedule:
    - cron: '2 4 * * *'  # 9:32 AM IST (UTC+5:30)
  workflow_dispatch:       # allow manual trigger from GitHub Actions tab

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Zoho Access Token
        id: zoho_token
        run: |
          RESPONSE=$(curl -s -X POST "https://accounts.zoho.eu/oauth/v2/token" \
            -d "grant_type=refresh_token" \
            -d "client_id=${{ secrets.ZOHO_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.ZOHO_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.ZOHO_REFRESH_TOKEN }}")
          echo "Response: $RESPONSE"
          ACCESS_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "access_token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Fetch Calls and Send Report
        run: python3 .github/scripts/send_report.py
        env:
          ZOHO_ACCESS_TOKEN: ${{ steps.zoho_token.outputs.access_token }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
